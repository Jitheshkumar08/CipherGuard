services:
  - type: web
    name: cipherguard-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    disks:
      - name: cipherguard-data
        mountPath: /var/data/cipherguard
        sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 10h
      - key: CORS_ORIGIN
        sync: false
      - key: SERVE_FRONTEND
        value: false
      - key: STORAGE_DIR
        value: /var/data/cipherguard/storage
